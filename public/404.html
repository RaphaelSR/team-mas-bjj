<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Team MAS BJJ</title>
    <script>
      // SPA redirect for GitHub Pages — preserves the path so React can handle it.
      // Encodes the full path/query/hash into a query param and sends to index.html.
      // https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
